name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: version
        run: echo "clean=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - id: channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *"-alpha."* ]]; then
            echo "level=alpha" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"-beta."* ]]; then
            echo "level=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" == *"-rc."* ]]; then
            echo "level=rc" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "level=stable" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          IS_LATEST=false
          if [[ "$VERSION" != *"-"* ]]; then
            IS_LATEST=true
          else
            HAS_STABLE=false
            HAS_BETA=false
            for tag in $(git tag -l 'v*' | grep -v "^${GITHUB_REF_NAME}$"); do
              v="${tag#v}"
              [[ "$v" != *"-"* ]] && HAS_STABLE=true
              [[ "$v" == *"-beta."* || "$v" == *"-rc."* ]] && HAS_BETA=true
            done
            if [[ "$VERSION" == *"-alpha."* && "$HAS_BETA" == "false" && "$HAS_STABLE" == "false" ]]; then
              IS_LATEST=true
            elif [[ "$VERSION" == *"-beta."* && "$HAS_STABLE" == "false" ]]; then
              IS_LATEST=true
            elif [[ "$VERSION" == *"-rc."* && "$HAS_STABLE" == "false" ]]; then
              IS_LATEST=true
            fi
          fi
          echo "is-latest=$IS_LATEST" >> $GITHUB_OUTPUT

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ steps.channel.outputs.is-latest }}
            type=raw,value=${{ steps.channel.outputs.level }},enable=${{ steps.channel.outputs.prerelease == 'true' }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/cfgate/cfgate/main/README.md
            io.artifacthub.package.logo-url=https://cfgate.io/icon.png
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.prerelease=${{ steps.channel.outputs.prerelease }}
            io.artifacthub.package.category=networking
            io.artifacthub.package.keywords=kubernetes,cloudflare,gateway-api,tunnel,dns,operator,controller
            io.artifacthub.package.maintainers=[{"name":"inherent-design","email":"mannie@inherent.design"}]
            org.opencontainers.image.vendor=inherent.design
            org.opencontainers.image.documentation=https://cfgate.io

      - id: build-test
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: cfgate:smoke-test
          build-args: |
            VERSION=${{ steps.version.outputs.clean }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Smoke test
        run: docker run --rm cfgate:smoke-test --help

      - id: trivy
        uses: aquasecurity/trivy-action@0.34.0
        continue-on-error: true
        with:
          image-ref: cfgate:smoke-test
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - uses: github/codeql-action/upload-sarif@v4
        if: always() && steps.trivy.conclusion != 'skipped' && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.clean }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          provenance: mode=max
          sbom: true

      - name: Attest container provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}

      - name: Install tools
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.20.0
          go install sigs.k8s.io/kustomize/kustomize/v5@latest
      - name: Generate manifests
        run: |
          sh tasks/codegen.sh
          IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.clean }} sh tasks/manifests.sh

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          prerelease: false
          files: |
            dist/install.yaml
            dist/crds.yaml
            dist/crds/*.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Version: ${{ steps.version.outputs.clean }}" >> $GITHUB_STEP_SUMMARY
          echo "- Channel: ${{ steps.channel.outputs.level }}" >> $GITHUB_STEP_SUMMARY
          echo "- Latest: ${{ steps.channel.outputs.is-latest }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.clean }}" >> $GITHUB_STEP_SUMMARY
          echo "- Digest: ${{ steps.push.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

      - uses: oras-project/setup-oras@v1

      - name: Push Artifact Hub metadata
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u ${{ github.actor }} --password-stdin
          oras push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.config.v1+yaml \
            artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml
